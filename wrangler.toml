name = "samagra"
pages_build_output_dir = "./website/dist"
compatibility_date = "2025-07-02"

# KV namespace for textbook metadata cache.
# Created via: npx wrangler kv namespace create TEXTBOOKS_KV
[[kv_namespaces]]
binding = "TEXTBOOKS_KV"
id = "b87a8c8dd12e41ecbffab693e17232be"

# Cron is NOT supported in Cloudflare Pages wrangler.toml.
# To trigger a manual metadata sync, run:
#   node scripts/sync.js
# Or hit the deployed sync endpoint:
#   curl https://your-site.pages.dev/sync-textbooks
