<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samagra Textbook Viewer</title>
  <link rel="icon" href="/logo.png" />
  <style>
    /*──── Kerala Kasavu theme ────*/
    :root {
      --ivory: #F5EDE0;
      --ivory-light: #FBF8F2;
      --cream: #EDE4D0;
      --kasavu: #D4AF37;
      --kasavu-dark: #B8960F;
      --kasavu-light: #F5E6A3;
      --green: #1E5631;
      --green-dark: #153D22;
      --green-bright: #2D7A46;
      --charcoal: #2C2C2C;
      --text: #3B3024;
      --muted: #8B7E6E;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
      --font: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%; background: var(--ivory); color: var(--text);
      font-family: var(--font); overflow: hidden;
    }

    /*──── Kasavu right border ────*/
    body::after {
      content: '';
      position: fixed; right: 0; top: 0; bottom: 0; width: 6px;
      background: linear-gradient(180deg, var(--kasavu), var(--cream), var(--kasavu-dark), var(--cream), var(--kasavu));
      z-index: 100;
    }

    /*──── Embed area ────*/
    #embed-wrap {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: #fff;
    }
    #pdf-embed {
      width: 100%; height: 100%; border: none;
    }

    /*──── Loading spinner ────*/
    #loading-state {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      z-index: 30;
    }
    .spinner {
      width: 44px; height: 44px; border: 3px solid var(--cream);
      border-top-color: var(--kasavu); border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 13px; color: var(--muted); font-weight: 500;
    }

    /*──── Error state ────*/
    #error-state {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      text-align: center; z-index: 30; display: none;
    }
    #error-state h2 { font-size: 18px; margin-bottom: 8px; color: var(--charcoal); }
    #error-state p { color: var(--muted); font-size: 14px; max-width: 320px; }


  </style>
</head>
<body>

  <div id="loading-state">
    <div class="spinner"></div>
    <span class="loading-text">Loading textbook…</span>
  </div>

  <div id="error-state">
    <h2>Unable to load textbook</h2>
    <p id="error-text"></p>
  </div>

  <div id="embed-wrap">
    <embed id="pdf-embed" type="application/pdf" />
  </div>

<script>
  var params = new URLSearchParams(location.search);
  var pdfUrl = params.get('url');
  var title = params.get('title') || 'Textbook';

  var loadingEl = document.getElementById('loading-state');
  var errorEl = document.getElementById('error-state');
  var errorText = document.getElementById('error-text');
  var pdfEmbed = document.getElementById('pdf-embed');

  document.title = title + ' \u2014 Samagra';

  /* Keyboard */
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') history.back();
  });

  if (!pdfUrl) {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'block';
    errorText.textContent = 'No PDF URL provided.';
  } else {
    // Security: only allow URLs starting with /files/ (our proxy path)
    var decoded = decodeURIComponent(pdfUrl);
    if (!/^\/files\//.test(decoded)) {
      loadingEl.style.display = 'none';
      errorEl.style.display = 'block';
      errorText.textContent = 'Invalid PDF URL.';
    } else {
      pdfEmbed.src = decoded;

      /* Hide loading when embed loads, or after 15s fallback */
      var loaded = false;
      pdfEmbed.addEventListener('load', function() {
        if (!loaded) { loaded = true; loadingEl.style.display = 'none'; }
      });
      setTimeout(function() {
        if (!loaded) { loaded = true; loadingEl.style.display = 'none'; }
      }, 15000);
    }
  }
</script>
</body>
</html>
